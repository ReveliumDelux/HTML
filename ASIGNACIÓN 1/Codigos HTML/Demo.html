<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eric - Marketplace</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#ff6a00;
    color:rgb(209, 10, 10);
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
}

.search-box input{
    padding:10px;
    width:300px;
    border:none;
    border-radius:5px;
}

.container{
    width:90%;
    margin:auto;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.product{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:5px;
}

.price{
    color:#ff6a00;
    font-size:20px;
    font-weight:bold;
}

button{
    background:#ff6a00;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e55c00;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:#222;
    color:white;
}
</style>

</head>
<body>

<header>
<h1>Eric Mini Ventas</h1>
<div class="search-box">
<input type="text" placeholder="Buscar productos...">
</div>
</header>

<div class="container">

<h2>Productos Destacados</h2>

<div class="products">

<div class="product">
<img src="https://picsum.photos/300/200?1">
<h3>Smartphone</h3>
<p class="price">$299</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/200?2">
<h3>Laptop</h3>
<p class="price">$799</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/200?3">
<h3>Auriculares Bluetooth</h3>
<p class="price">$59</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/200?4">
<h3>Smartwatch</h3>
<p class="price">$120</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/200?5">
<h3>Cámara</h3>
<p class="price">$450</p>
<button>Comprar</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/200?6">
<h3>Tablet</h3>
<p class="price">$230</p>
<button>Comprar</button>
</div>

</div>

</div>

<footer>
<p>© 2026 Eric Marketplace</p>
</footer>

</body>
</html>
