<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
<title>Pagina 2 - Catalogo</title>
<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

/* HEADER Y MENU */

.site-header{
background:#ff6a00;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 30px;
color:white;
}

.brand{
font-size:22px;
font-weight:bold;
}

.main-nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-weight:bold;
}

.main-nav a:hover{
text-decoration:underline;
}

/* BUSCADOR */

.search-form input{
padding:8px;
border-radius:5px;
border:none;
}

/* CONTENEDOR */

.container{
width:90%;
max-width:1100px;
margin:auto;
}

/* PRODUCTOS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.product{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
border-radius:5px;
}

.price{
color:#ff6a00;
font-size:20px;
font-weight:bold;
}

button{
background:#ff6a00;
border:none;
color:white;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e55c00;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
margin-top:40px;
background:#222;
color:white;
}

</style>
</head>
